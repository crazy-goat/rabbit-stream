name: CI

on:
  pull_request:
    branches: ["main"]

jobs:
  check-actor:
    name: Check actor permissions
    runs-on: ubuntu-latest
    outputs:
      allowed: ${{ steps.check.outputs.allowed }}
    steps:
      - name: Check if actor is owner or collaborator
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const actor = context.actor;
            const owner = context.repo.owner;

            // Always allow the org/repo owner
            if (actor === owner) {
              core.setOutput('allowed', 'true');
              return;
            }

            // Check collaborator permission level
            try {
              const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: actor,
              });
              const level = data.permission;
              const allowed = ['admin', 'maintain', 'write'].includes(level);
              core.setOutput('allowed', allowed ? 'true' : 'false');
              if (!allowed) {
                core.warning(`Actor "${actor}" has permission "${level}" — skipping CI.`);
              }
            } catch (e) {
              core.setOutput('allowed', 'false');
              core.warning(`Could not determine permissions for "${actor}": ${e.message}`);
            }

  lint:
    name: Lint (PHP_CodeSniffer)
    needs: check-actor
    if: needs.check-actor.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run linter
        run: composer lint

  rector-check:
    name: Rector (dry-run)
    needs: [check-actor, lint]
    if: needs.check-actor.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run Rector dry-run
        run: ./vendor/bin/rector process --dry-run

  static-analysis:
    name: PHPStan (level 0)
    needs: [check-actor, rector-check]
    if: needs.check-actor.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPStan
        run: composer phpstan

  unit-tests:
    name: Unit Tests (PHP ${{ matrix.php }})
    needs: [check-actor, lint, rector-check, static-analysis]
    if: needs.check-actor.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ["8.1", "8.2", "8.3", "8.4"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run unit tests
        run: ./vendor/bin/phpunit --testsuite unit --testdox

  e2e-tests:
    name: E2E Tests
    needs: [check-actor, lint, rector-check]
    if: needs.check-actor.outputs.allowed == 'true'
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq:4-management
        env:
          RABBITMQ_DEFAULT_USER: guest
          RABBITMQ_DEFAULT_PASS: guest
        ports:
          - 5552:5552
          - 15672:15672
        options: >-
          --health-cmd "rabbitmq-diagnostics check_port_connectivity"
          --health-interval 5s
          --health-timeout 10s
          --health-retries 15
          --health-start-period 30s

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Enable RabbitMQ Stream plugin
        run: |
          docker exec ${{ job.services.rabbitmq.id }} rabbitmq-plugins enable rabbitmq_stream
          sleep 5

      - name: Create test fixtures
        run: |
          curl -sf -u guest:guest -X PUT http://127.0.0.1:15672/api/queues/%2F/test-stream \
            -H "Content-Type: application/json" \
            -d '{"durable":true,"arguments":{"x-queue-type":"stream"}}'

      - name: Run E2E tests
        env:
          RABBITMQ_HOST: 127.0.0.1
          RABBITMQ_PORT: 5552
        run: ./vendor/bin/phpunit --testsuite e2e --testdox
